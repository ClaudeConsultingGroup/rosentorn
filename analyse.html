<style>
:root { --ink:#1a1a1a; --muted:#666; --accent:#2a5d9f; --line:#e6e6e6; --bg:#fafafa; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Georgia,'Times New Roman',serif; color:var(--ink); background:var(--bg); line-height:1.6; display:flex; justify-content:center; padding:10px 24px; }
main { max-width:1100px; width:100%; }
nav.topnav { display:flex; justify-content:center; gap:28px; margin-bottom:18px; padding-top:12px; padding-bottom:12px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); font-family:-apple-system,system-ui,sans-serif; }
nav.topnav a { text-transform:uppercase; letter-spacing:0.08em; font-size:0.95rem; color:var(--ink); text-decoration:none; }
nav.topnav a:hover { color:var(--accent); }
nav.topnav a.active { color:var(--accent); }
.site-footer { margin-top:22px; padding-top:20px; border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:10px; }
.social { display:flex; justify-content:center; gap:22px; }
.social a { color:var(--muted); display:inline-flex; transition:color 0.2s ease, transform 0.2s ease; }
.social a:hover { color:#c0392b; transform:translateY(-2px); }
.social svg { width:20px; height:20px; fill:currentColor; }
.page-mark { text-align:center; margin:6px 0 24px; }
.page-mark .mark-eyebrow { display:inline-block; font-family:-apple-system,system-ui,sans-serif; font-size:0.95rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#c0392b; }
h1 { font-size:3.4rem; letter-spacing:0.01em; font-weight:700; line-height:1.05; text-align:center; }
h1::after { content:""; display:block; width:56px; height:3px; background:#c0392b; margin:14px auto 0; }
.back { display:block; text-align:center; margin:0 auto 12px; font-family:Georgia,'Times New Roman',serif; font-size:1.4rem; font-weight:700; letter-spacing:0.01em; color:var(--ink); text-decoration:none; }
.back:hover { text-decoration:underline; }
a.back:hover::first-letter { color: #c0392b; }

/* Carousel */
.carousel { position:relative; margin-top:10px; display:flex; align-items:center; gap:10px; }
.carousel-viewport { overflow:hidden; flex:1 1 auto; padding:82px 0; }
.carousel-track { display:flex; gap:20px; will-change:transform; touch-action:pan-y; align-items:center; }
/* Hvert af de tre synlige felter fylder en tredjedel – intet peeking. */
.carousel-slide { flex:0 0 calc((100% - 40px) / 3); text-align:center; transition:opacity 0.5s ease; transform:scale(0.60); opacity:0.45; transform-origin:center center; }
/* Det midterste billede er størst; siderne er meget mindre. */
.carousel-slide.is-center { transform:scale(1.50); opacity:1; }
.carousel-slide img { width:100%; height:auto; border:1px solid var(--line); border-radius:6px; box-shadow:0 3px 12px rgba(0,0,0,0.05); transition:box-shadow 0.3s ease; cursor:zoom-in; display:block; -webkit-user-drag:none; user-select:none; }
.carousel-slide.is-center img { box-shadow:0 14px 34px rgba(0,0,0,0.18); }
.carousel-btn { flex:0 0 auto; width:46px; height:46px; border-radius:50%; border:1px solid var(--line); background:#fff; color:var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.10); transition:transform 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease; z-index:2; opacity:0.5; }
.carousel-btn:hover { background:var(--accent); color:#fff; transform:scale(1.07); box-shadow:0 8px 20px rgba(0,0,0,0.16); opacity:1; }
.carousel-btn:active { transform:scale(0.96); }
.carousel-btn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
.carousel-dots { display:flex; justify-content:center; gap:9px; margin-top:22px; }
.carousel-dots .dot { width:8px; height:8px; border-radius:50%; border:none; padding:0; background:#d6d2cc; cursor:pointer; transition:background 0.2s ease, transform 0.2s ease; }
.carousel-dots .dot.active { background:#c0392b; transform:scale(1.3); }
@media (max-width:760px) {
.carousel-slide { flex:0 0 calc((100% - 18px) / 2); }
}
@media (max-width:560px) {
/* På mobil: ét stort billede ad gangen. Pilene skjules – de røde prikker
nedenunder bruges til navigation i stedet. */
.carousel { gap:0; }
.carousel-track { gap:0; }
.carousel-viewport { padding:8px 0; }
.carousel-slide { flex:0 0 100%; transform:none; opacity:1; }
.carousel-slide.is-center { transform:none; }
.carousel-btn { display:none; }
}
.submit-note { font-family:-apple-system,system-ui,sans-serif; font-size:0.85rem; text-align:center; color:var(--muted); margin:18px auto 0; max-width:680px; }
.submit-note a { color:var(--accent); text-decoration:none; font-weight:600; }
.submit-note a:hover { text-decoration:underline; }
.lightbox { position:fixed; inset:0; background:rgba(20,18,16,0.88); display:flex; align-items:center; justify-content:center; padding:4vh 4vw; z-index:1000; opacity:0; visibility:hidden; transition:opacity 0.25s ease, visibility 0.25s ease; cursor:zoom-out; }
.lightbox.open { opacity:1; visibility:visible; }
.lightbox img { max-width:100%; max-height:92vh; width:auto; height:auto; border-radius:8px; box-shadow:0 18px 50px rgba(0,0,0,0.5); transform:scale(0.96); transition:transform 0.25s ease; }
.lightbox.open img { transform:scale(1); }
.lightbox-close { position:absolute; top:18px; right:24px; width:44px; height:44px; border:none; border-radius:50%; background:rgba(255,255,255,0.12); color:#fff; font-size:1.6rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s ease; }
.lightbox-close:hover { background:rgba(255,255,255,0.25); }
.submit-note .om-link { display: inline; white-space: nowrap; }
.submit-note .om-arrow { display: inline-block; margin-left: 3px; transition: transform 0.2s ease; }
.submit-note .om-link:hover { text-decoration: none; }
.submit-note .om-link:hover .om-arrow { transform: translateX(3px); }

@media (max-width: 640px) {
.submit-note .om-link { display: block; white-space: normal; margin-top: 2px; }
}

.analyse-wrap{display:flex;justify-content:center;padding:24px 20px 8px;}
