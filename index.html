<style>
:root {
--ink: #1a1a1a;
--muted: #666;
--accent: #2a5d9f;
--line: #e6e6e6;
--bg: #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
font-family: Georgia, 'Times New Roman', serif;
color: var(--ink);
background: var(--bg);
line-height: 1.6;
display: flex;
justify-content: center;
align-items: center;
padding: 2vh 24px;
}
main { max-width: 880px; width: 100%; }
nav.topnav { display: flex; justify-content: center; gap: 28px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--line); font-family: -apple-system, system-ui, sans-serif; }
nav.topnav a { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.95rem; color: var(--ink); text-decoration: none; }
nav.topnav a:hover { color: var(--accent); }
.site-footer { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; gap: 8px; }
.social { display: flex; justify-content: center; gap: 22px; }
.social a { color: var(--muted); display: inline-flex; transition: color 0.2s ease, transform 0.2s ease; }
.social a:hover { color: #c0392b; transform: translateY(-2px); }
.social svg { width: 20px; height: 20px; fill: currentColor; }
.brand { text-align: center; margin-top: 0; }
.brand h1 { letter-spacing: -0.02em; }
.brand h1 a { color: inherit; text-decoration: none; display: inline-block; transition: transform 0.25s ease; transform-origin: center; }
.brand h1 a:hover { transform: scale(1.06); }
.brand h1 a:hover::first-letter { color: #c0392b; }
h1 {
font-size: 2.1rem;
letter-spacing: 0.01em;
font-weight: 700;
line-height: 1.05;
}
.brand h1::after {
content: "";
display: block;
width: 40px;
height: 3px;
background: #c0392b;
margin: 8px auto 0;
}
.debat {
margin-top: 18px;
padding-top: 16px;
border-top: 1px solid var(--line);
}
.debat-kicker-section {
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.78rem;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.18em;
color: #c0392b;
margin-bottom: 16px;
text-align: center;
}
.debat-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 30px;
align-items: start;
}
.debat-card {
display: flex;
flex-direction: column;
text-decoration: none;
color: inherit;
}
.debat-figure {
position: relative;
width: 100%;
aspect-ratio: 16 / 10;
overflow: hidden;
border-radius: 12px;
box-shadow: 0 3px 14px rgba(0,0,0,0.12);
}
.debat-figure img {
display: block;
width: 100%;
height: 100%;
object-fit: cover;
filter: grayscale(100%);
transition: transform 0.4s ease, filter 0.3s ease;
}
.debat-card:hover .debat-figure img {
transform: scale(1.05);
filter: grayscale(0%);
}
.debat-card:hover .debat-figure {
box-shadow: 0 10px 26px rgba(0,0,0,0.18);
}
.debat-eyebrow {
position: absolute;
z-index: 2;
top: 12px;
left: 12px;
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.66rem;
font-weight: 700;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #fff;
background: #c0392b;
padding: 5px 11px;
border-radius: 999px;
box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}
.debat-headline {
font-size: 1.32rem;
line-height: 1.22;
font-weight: 700;
margin-top: 14px;
}
.debat-card:hover .debat-headline { color: var(--accent); }
.debat-byline {
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.88rem;
color: var(--muted);
margin-top: 10px;
}
.debat-byline .author {
position: relative;
display: inline-block;
color: var(--ink);
font-weight: 600;
}
.debat-byline .author::after {
content: "";
position: absolute;
left: 0;
right: 0;
bottom: -3px;
height: 2px;
background: #c0392b;
transition: height 0.2s ease;
}
.debat-card:hover .debat-byline .author::after { height: 3px; }
.debat-cta {
display: inline-flex;
align-items: center;
gap: 6px;
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.88rem;
font-weight: 600;
color: var(--accent);
margin-top: 12px;
}
.debat-cta::after { content: "\2192"; color: var(--muted); transition: transform 0.2s ease; }
.debat-card:hover .debat-cta::after { transform: translateX(4px); }
@media (max-width: 640px) {
body { align-items: flex-start; }
.debat-grid { grid-template-columns: 1fr; gap: 22px; }
}
.submit-note {
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.85rem;
text-align: center;
color: var(--muted);
margin: 14px auto 0;
max-width: 520px;
}
.submit-note a {
color: var(--accent);
text-decoration: none;
font-weight: 600;
}
.submit-note a:hover {
text-decoration: underline;
}
</style>
</head>
