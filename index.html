<style>
:root {
--ink: #1a1a1a;
--muted: #666;
--accent: #2a5d9f;
--line: #e6e6e6;
--bg: #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
font-family: Georgia, 'Times New Roman', serif;
color: var(--ink);
background: var(--bg);
line-height: 1.6;
display: flex;
justify-content: center;
align-items: center;
padding: 2vh 24px;
}
main { max-width: 1000px; width: 100%; }
nav.topnav { display: flex; justify-content: center; gap: 28px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line); font-family: -apple-system, system-ui, sans-serif; }
nav.topnav a { text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.95rem; color: var(--ink); text-decoration: none; }
nav.topnav a:hover { color: var(--accent); }
nav.topnav a.active { color: var(--accent); }
.site-footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; gap: 8px; }
.social { display: flex; justify-content: center; gap: 22px; }
.social a { color: var(--muted); display: inline-flex; transition: color 0.2s ease, transform 0.2s ease; }
.social a:hover { color: #c0392b; transform: translateY(-2px); }
.social .social-om { align-self: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; }
.social .social-om:hover { transform: translateY(-2px); }
.social svg { width: 20px; height: 20px; fill: currentColor; }
.brand { text-align: center; margin-top: 0; }
.brand h1 { letter-spacing: -0.02em; }
.brand h1 a { color: inherit; text-decoration: none; display: inline-block; transition: transform 0.25s ease; transform-origin: center; }
.brand h1 a:hover { transform: scale(1.06); }
.brand h1 a:hover::first-letter { color: #c0392b; }
h1 {
font-size: 1.9rem;
letter-spacing: 0.01em;
font-weight: 700;
line-height: 1.05;
}
.brand h1::after {
content: "";
display: block;
width: 40px;
height: 3px;
background: #c0392b;
margin: 7px auto 0;
}
.debat {
margin-top: 12px;
padding-top: 12px;
border-top: 1px solid var(--line);
}
.debat-kicker-section {
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.74rem;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.2em;
color: #c0392b;
margin-bottom: 6px;
text-align: center;
}
/* Debat-karrusel – coverflow-stil: stort midterkort med fuld tekst,
   små og nedtonede sidekort der kun viser billedet. */
.debat-carousel { position: relative; display: block; max-width: calc(46vh * 4 / 3); margin: 0 auto; }
.debat-viewport { overflow: hidden; flex: 1 1 auto; padding: 10px 8px 6px; }
.debat-track { display: flex; gap: 28px; will-change: transform; touch-action: pan-y; align-items: center; }
.debat-slide {
flex: 0 0 100%;
min-width: 0;
transition: transform 0.55s cubic-bezier(0.22,0.61,0.36,1), opacity 0.55s ease;
transform: none;
opacity: 1;
transform-origin: center center;
filter: none;
}
.debat-slide.is-center {
transform: scale(1);
opacity: 1;
filter: none;
position: relative;
z-index: 3;
}
.debat-arrow-btn {
position: absolute;
top: calc(10px + 23vh);
transform: translateY(-50%);
width: 42px;
height: 42px;
border-radius: 50%;
border: 1px solid var(--line);
background: #fff;
color: var(--accent);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
box-shadow: 0 4px 14px rgba(0,0,0,0.12);
z-index: 6;
opacity: 0.5;
transition: opacity 0.2s ease, transform 0.15s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}
.debat-arrow-btn:hover { background: var(--accent); color: #fff; opacity: 1; transform: translateY(-50%) scale(1.07); box-shadow: 0 8px 20px rgba(0,0,0,0.18); }
.debat-arrow-btn:active { transform: translateY(-50%) scale(0.96); }
.debat-arrow-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }
.debat-dots { display: flex; justify-content: center; gap: 9px; margin-top: 14px; }
#debatPrev { left: -54px; }
#debatNext { right: -54px; }
.debat-dots .dot { width: 8px; height: 8px; border-radius: 50%; border: none; padding: 0; background: #d6d2cc; cursor: pointer; transition: background 0.2s ease, transform 0.2s ease; }
.debat-dots .dot.active { background: #c0392b; transform: scale(1.3); }
.debat-card {
display: flex;
flex-direction: column;
text-decoration: none;
color: inherit;
}
.debat-figure {
position: relative;
width: 100%;
aspect-ratio: 4 / 3;
   max-height: 46vh;
   max-width: calc(46vh * 4 / 3);
   margin: 0 auto;
overflow: hidden;
border-radius: 12px;
transition: box-shadow 0.35s ease;
}
.debat-slide.is-center .debat-figure { box-shadow: none; }
.debat-figure img {
display: block;
width: 100%;
height: 100%;
object-fit: cover;
object-position: center 22%;
filter: grayscale(100%);
transition: transform 0.5s ease, filter 0.4s ease;
}
.debat-card:hover .debat-figure img { transform: scale(1.05); filter: grayscale(0%); }
.debat-credit {
position: absolute;
z-index: 2;
left: 6px;
bottom: 10px;
writing-mode: vertical-rl;
transform: rotate(180deg);
transform-origin: center;
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.5rem;
font-weight: 500;
letter-spacing: 0.02em;
color: #fff;
text-shadow: 0 1px 3px rgba(0,0,0,0.85);
}
.debat-body {
margin-top: 12px;
text-align: center;
}
.debat-headline {
font-size: 0.92rem;
line-height: 1.25;
font-weight: 700;
color: var(--ink);
transition: color 0.25s ease, font-size 0.4s ease;
}
.debat-slide.is-center .debat-headline { font-size: 1.18rem; line-height: 1.2; }
.debat-card:hover .debat-headline { color: var(--accent); }
/* Sidekort: vis kun billede + dæmpet overskrift, skjul resten så layoutet er rent. */
.debat-slide:not(.is-center) .debat-byline,
.debat-slide:not(.is-center) .debat-cta { display: none; }
.author-arrow { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: rgba(42,90,140,0.10); margin-left: 2px; flex: 0 0 auto; transition: transform 0.2s ease, background 0.2s ease; }
.author-arrow svg { width: 12px; height: 12px; fill: none; stroke: var(--accent); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s ease; }
.debat-card:hover .author-arrow { background: var(--accent); transform: translateX(3px); }
.debat-card:hover .author-arrow svg { stroke: #fff; }
.debat-slide:not(.is-center) .author-arrow { display: none; }
.debat-slide:not(.is-center) .debat-body { margin-top: 9px; }
.debat-byline {
display: flex;
flex-wrap: wrap;
align-items: center;
justify-content: center;
gap: 7px;
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.8rem;
letter-spacing: 0.01em;
color: var(--muted);
margin-top: 8px;
}
.debat-byline .by-label {
text-transform: uppercase;
letter-spacing: 0.14em;
font-size: 0.64rem;
font-weight: 700;
color: #b9b3ad;
}
.debat-byline .author { color: var(--ink); font-weight: 600; }
.debat-byline .by-dot { width: 4px; height: 4px; border-radius: 50%; background: #c0392b; flex: none; }
.by-credit { font-style: italic; color: var(--muted); font-size: 0.74rem; letter-spacing: 0.02em; flex-basis: 100%; }
.debat-cta {
display: inline-flex;
align-items: center;
gap: 9px;
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.82rem;
font-weight: 600;
letter-spacing: 0.01em;
color: var(--accent);
margin-top: 12px;
}
.debat-cta .cta-arrow {
display: inline-flex;
align-items: center;
justify-content: center;
width: 26px;
height: 26px;
border-radius: 50%;
background: rgba(42,93,159,0.10);
transition: background 0.25s ease, transform 0.25s ease;
}
.debat-cta .cta-arrow svg { width: 13px; height: 13px; fill: none; stroke: var(--accent); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.debat-cta .cta-text { position: relative; }
.debat-cta .cta-text::after {
content: "";
position: absolute;
left: 0; bottom: -3px;
width: 100%; height: 1.5px;
background: var(--accent);
transform: scaleX(0);
transform-origin: left;
transition: transform 0.3s ease;
}
.debat-card:hover .debat-cta .cta-text::after { transform: scaleX(1); }
.debat-card:hover .debat-cta .cta-arrow { background: var(--accent); transform: translateX(3px); }
.debat-card:hover .debat-cta .cta-arrow svg { stroke: #fff; }
@media (max-width: 640px) {
body { align-items: flex-start; }
/* Mobil: ét indlæg ad gangen i fuld størrelse, pile skjult – prikker styrer. */
.debat-carousel { gap: 0; }
.debat-track { gap: 0; }
.debat-viewport { padding: 6px 0; }
.debat-slide { flex: 0 0 100%; transform: none; opacity: 1; filter: none; }
.debat-slide.is-center { transform: none; }
.debat-slide:not(.is-center) .debat-byline,
.debat-slide:not(.is-center) .debat-cta { display: flex; }
.debat-headline, .debat-slide.is-center .debat-headline { font-size: 1.3rem; }
.debat-arrow-btn { width: 36px; height: 36px; }
  #debatPrev { left: 4px; }
  #debatNext { right: 4px; }
}
.submit-note {
font-family: -apple-system, system-ui, sans-serif;
font-size: 0.85rem;
text-align: center;
color: var(--muted);
margin: 12px auto 0;
max-width: 520px;
}
.submit-note a { color: var(--accent); text-decoration: none; font-weight: 600; }
.submit-note a:hover { text-decoration: underline; }
.submit-note .om-link { display: inline-flex; align-items: center; gap: 3px; }
.submit-note .om-arrow { display: inline-block; transition: transform 0.2s ease; }
.submit-note .om-link:hover { text-decoration: none; }
.submit-note .om-link:hover .om-arrow { transform: translateX(3px); }

<script>
(function () {
var posts = [
{ href: "/debatindlaeg-manosfaeren", img: "rasmus-dm-debat.jpg", imgStyle: "object-position: 50% 18%;", alt: "Rasmus Jungersen Emborg", credit: "Foto: Ida Guldbæk Arentsen", headline: "»Vi udskammer unge mænd, der bare søger svar«", author: "Rasmus Jungersen Emborg", byCredit: "Vinder af DM i Debat 2026" },
{ href: "/debatindlaeg-ai", img: "simon-eu.jpg", imgStyle: "", alt: "Simon Bødker", credit: "", headline: "»Gud døde med Nietzsche og genopstod med AI«", author: "Simon Bødker", byCredit: "" },
{ href: "/debatindlaeg", img: "simon-mikrofon.jpg", imgStyle: "", alt: "Simon Bødker ved mikrofonen", credit: "", headline: "»Drømmen om eget hjem er blevet et fatamorgana«", author: "Simon Bødker", byCredit: "" }
];

var track = document.getElementById("debatTrack");
var viewport = track.parentElement;
var prevBtn = document.getElementById("debatPrev");
var nextBtn = document.getElementById("debatNext");
var dotsWrap = document.getElementById("debatDots");

function perView() { return 1; }

var buffer = posts.length;
var slidesData = [];
for (var i = 0; i < buffer; i++) slidesData.push(posts[((posts.length - buffer + i) % posts.length + posts.length) % posts.length]);
for (var j = 0; j < posts.length; j++) slidesData.push(posts[j]);
for (var k = 0; k < buffer; k++) slidesData.push(posts[k % posts.length]);

function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : s; return d.innerHTML; }

function makeSlide(p) {
var slide = document.createElement("div");
slide.className = "debat-slide";
var creditHtml = p.credit ? '<span class="debat-credit">' + esc(p.credit) + '</span>' : '';
var byCreditHtml = p.byCredit ? '<span class="by-credit">' + esc(p.byCredit) + '</span>' : '';
var styleAttr = p.imgStyle ? ' style="' + p.imgStyle + '"' : '';
slide.innerHTML =
'<a class="debat-card" href="' + p.href + '">' +
'<div class="debat-figure">' +
'<img loading="lazy"' + styleAttr + ' src="' + p.img + '" alt="' + esc(p.alt) + '">' +
creditHtml +
'</div>' +
'<div class="debat-body">' +
'<p class="debat-headline">' + esc(p.headline) + '</p>' +
'<p class="debat-byline"><span class="by-label">Af</span><span class="by-dot"></span><span class="author">' + esc(p.author) + '</span><span class="author-arrow"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>' + byCreditHtml + '</p>' +

'</div>' +
'</a>';
return slide;
}
slidesData.forEach(function (p) { track.appendChild(makeSlide(p)); });
var slides = track.children;

var dots = [];
posts.forEach(function (_, i) {
var b = document.createElement("button");
b.className = "dot"; b.type = "button";
b.setAttribute("aria-label", "Gå til indlæg " + (i + 1));
b.addEventListener("click", function () { userAction(function(){ goTo(i); }); });
dotsWrap.appendChild(b); dots.push(b);
});

// Start centreret på det første indlæg (Rasmus).
var startOffset = Math.floor((perView() - 1) / 2);
var index = buffer - startOffset;
var animating = false;

function realIndex() { return ((index - buffer) % posts.length + posts.length) % posts.length; }
function centerRealIndex() { var off = Math.floor((perView() - 1) / 2); return ((index + off - buffer) % posts.length + posts.length) % posts.length; }
function updateDots() { var real = centerRealIndex(); dots.forEach(function (d, i) { d.classList.toggle("active", i === real); }); }

function slideWidth() {
var first = track.children[0];
var style = getComputedStyle(track);
var gap = parseFloat(style.columnGap || style.gap || "0") || 0;
return first.offsetWidth + gap;
}

function updateCenter() {
var off = Math.floor((perView() - 1) / 2);
for (var s = 0; s < slides.length; s++) slides[s].classList.remove("is-center");
var centerIdx = index + off;
if (slides[centerIdx]) slides[centerIdx].classList.add("is-center");
}

function setPosition(animate) {
track.style.transition = animate ? "transform 0.55s cubic-bezier(0.22,0.61,0.36,1)" : "none";
track.style.transform = "translateX(" + (-index * slideWidth()) + "px)";
updateDots();
updateCenter();
}

function normalize() {
var realCount = posts.length;
if (index >= buffer + realCount) { index -= realCount; setPosition(false); }
else if (index < buffer - startOffset) { index += realCount; setPosition(false); }
}

function go(dir) { if (animating) return; animating = true; index += dir; setPosition(true); }
function goTo(real) { if (animating) return; var diff = real - centerRealIndex(); if (diff === 0) return; animating = true; index += diff; setPosition(true); }

track.addEventListener("transitionend", function (e) {
if (e.target !== track || e.propertyName !== "transform") return;
animating = false; normalize();
});

var AUTO_MS = 10000;
var autoTimer = null;
var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function startAuto() { if (prefersReduced || autoTimer) return; autoTimer = setInterval(function () { go(1); }, AUTO_MS); }
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
function restartAuto() { stopAuto(); startAuto(); }
function userAction(fn) { stopAuto(); fn(); restartAuto(); }

nextBtn.addEventListener("click", function () { userAction(function(){ go(1); }); });
prevBtn.addEventListener("click", function () { userAction(function(){ go(-1); }); });

viewport.addEventListener("mouseenter", stopAuto);
viewport.addEventListener("mouseleave", restartAuto);

var startX = 0, startY = 0, dragging = false, swiped = false;
viewport.addEventListener("touchstart", function (e) {
if (e.touches.length !== 1) return;
startX = e.touches[0].clientX; startY = e.touches[0].clientY;
dragging = true; swiped = false; stopAuto();
}, { passive: true });
viewport.addEventListener("touchmove", function (e) {
if (!dragging) return;
var dx = e.touches[0].clientX - startX;
var dy = e.touches[0].clientY - startY;
if (!swiped && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) { swiped = true; go(dx < 0 ? 1 : -1); }
}, { passive: true });
viewport.addEventListener("touchend", function () { dragging = false; restartAuto(); });

var resizeTimer;
window.addEventListener("resize", function () {
clearTimeout(resizeTimer);
resizeTimer = setTimeout(function () { startOffset = Math.floor((perView() - 1) / 2); setPosition(false); }, 120);
});

requestAnimationFrame(function () { setPosition(false); startAuto(); });
window.addEventListener("load", function () { setPosition(false); });
})();
if ("serviceWorker" in navigator) {
window.addEventListener("load", function () {
navigator.serviceWorker.register("/sw.js").catch(function () {});
});
}
