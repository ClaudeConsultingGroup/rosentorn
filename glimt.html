<style>
:root { --ink:#1a1a1a; --muted:#666; --accent:#2a5d9f; --line:#e6e6e6; --bg:#fafafa; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Georgia,'Times New Roman',serif; color:var(--ink); background:var(--bg); line-height:1.6; display:flex; justify-content:center; padding:10px 24px; }
main { max-width:1100px; width:100%; }
nav.topnav { display:flex; justify-content:center; gap:28px; margin-bottom:18px; padding-top:12px; padding-bottom:12px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); font-family:-apple-system,system-ui,sans-serif; }
nav.topnav a { text-transform:uppercase; letter-spacing:0.08em; font-size:0.95rem; color:var(--ink); text-decoration:none; }
nav.topnav a:hover { color:var(--accent); }
nav.topnav a.active { color:var(--accent); }
.site-footer { margin-top:22px; padding-top:20px; border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:10px; }
.social { display:flex; justify-content:center; gap:22px; }

.social a:hover { color:#c0392b; transform:translateY(-2px); }
.social svg { width:20px; height:20px; fill:currentColor; }
.page-mark { text-align:center; margin:6px 0 24px; }
.page-mark .mark-eyebrow { display:inline-block; font-family:-apple-system,system-ui,sans-serif; font-size:0.95rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#c0392b; }
h1 { font-size:3.4rem; letter-spacing:0.01em; font-weight:700; line-height:1.05; text-align:center; }
h1::after { content:""; display:block; width:56px; height:3px; background:#c0392b; margin:14px auto 0; }
.back { display:block; text-align:center; margin:0 auto 12px; font-family:Georgia,'Times New Roman',serif; font-size:1.4rem; font-weight:700; letter-spacing:0.01em; color:var(--ink); text-decoration:none; }
.back:hover { text-decoration:underline; }
a.back:hover::first-letter { color: #c0392b; }

/* Carousel */
.carousel { position:relative; margin-top:10px; display:flex; align-items:center; gap:10px; }
.carousel-viewport { overflow:hidden; flex:1 1 auto; padding:82px 0; }
.carousel-track { display:flex; gap:20px; will-change:transform; touch-action:pan-y; align-items:center; }
/* Hvert af de tre synlige felter fylder en tredjedel – intet peeking. */
.carousel-slide { flex:0 0 calc((100% - 40px) / 3); text-align:center; transition:opacity 0.5s ease; transform:scale(0.60); opacity:0.45; transform-origin:center center; }
/* Det midterste billede er størst; siderne er meget mindre. */
.carousel-slide.is-center { transform:scale(1.50); opacity:1; }
.carousel-slide img { width:100%; height:auto; border:1px solid var(--line); border-radius:6px; box-shadow:0 3px 12px rgba(0,0,0,0.05); transition:box-shadow 0.3s ease; cursor:zoom-in; display:block; -webkit-user-drag:none; user-select:none; }
.carousel-slide.is-center img { box-shadow:0 14px 34px rgba(0,0,0,0.18); }
.carousel-btn { flex:0 0 auto; width:46px; height:46px; border-radius:50%; border:1px solid var(--line); background:#fff; color:var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,0.10); transition:transform 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease; z-index:2; opacity:0.5; }
.carousel-btn:hover { background:var(--accent); color:#fff; transform:scale(1.07); box-shadow:0 8px 20px rgba(0,0,0,0.16); opacity:1; }
.carousel-btn:active { transform:scale(0.96); }
.carousel-btn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
.carousel-dots { display:flex; justify-content:center; gap:9px; margin-top:22px; }
.carousel-dots .dot { width:8px; height:8px; border-radius:50%; border:none; padding:0; background:#d6d2cc; cursor:pointer; transition:background 0.2s ease, transform 0.2s ease; }
.carousel-dots .dot.active { background:#c0392b; transform:scale(1.3); }
@media (max-width:760px) {
.carousel-slide { flex:0 0 calc((100% - 18px) / 2); }
}
@media (max-width:560px) {
/* På mobil: ét stort billede ad gangen. Pilene skjules – de røde prikker
nedenunder bruges til navigation i stedet. */
.carousel { gap:0; }
.carousel-track { gap:0; }
.carousel-viewport { padding:8px 0; }
.carousel-slide { flex:0 0 100%; transform:none; opacity:1; }
.carousel-slide.is-center { transform:none; }
.carousel-btn { display:none; }
}
.submit-note { font-family:-apple-system,system-ui,sans-serif; font-size:0.85rem; text-align:center; color:var(--muted); margin:18px auto 0; max-width:680px; }

.lightbox { position:fixed; inset:0; background:rgba(20,18,16,0.88); display:flex; align-items:center; justify-content:center; padding:4vh 4vw; z-index:1000; opacity:0; visibility:hidden; transition:opacity 0.25s ease, visibility 0.25s ease; cursor:zoom-out; }
.lightbox.open { opacity:1; visibility:visible; }

.lightbox.open img { transform:scale(1); }
.lightbox-close { position:absolute; top:18px; right:24px; width:44px; height:44px; border:none; border-radius:50%; background:rgba(255,255,255,0.12); color:#fff; font-size:1.6rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s ease; }
.lightbox-close:hover { background:rgba(255,255,255,0.25); }

.submit-note .om-link:hover .om-arrow { transform: translateX(3px); }

@media (max-width: 640px) {
.submit-note .om-link { display: block; white-space: normal; margin-top: 2px; }

<script>
(function () {
var images = [
{ src: "meme-boligdebatten.png", alt: "Meme: Boligdebatten – venstrefløjen mod højrefløjen." },
{ src: "meme-generationskloeften.png", alt: "Meme: Generationskløften – boomer mod Gen-Z." },
{ src: "meme-den-moderne-mand.png", alt: "Meme: Den moderne mand – venstrefløjens mod højrefløjens mænd." },
{ src: "meme-priserne-stikker-af.png", alt: "Meme: graf der viser boligpriser stiger meget hurtigere end din løn." },
{ src: "meme-droemmen-om-eget-hjem.png", alt: "Meme: kamel i ørkenen siger Vi er der næsten foran en boligblok til 5,4 mio." },
{ src: "meme-vejen-ind-paa-boligmarkedet.png", alt: "Meme: flowchart over vejen ind på boligmarkedet." }
];

var track = document.getElementById("carTrack");
var viewport = track.parentElement;
var prevBtn = document.getElementById("carPrev");
var nextBtn = document.getElementById("carNext");
var dotsWrap = document.getElementById("carDots");

var lightbox = document.getElementById("lightbox");
var lightboxImg = document.getElementById("lightboxImg");
var closeBtn = document.getElementById("lightboxClose");

function openLightbox(src, alt) {
lightboxImg.src = src; lightboxImg.alt = alt || "";
lightbox.classList.add("open"); lightbox.setAttribute("aria-hidden", "false");
document.body.style.overflow = "hidden";
stopAuto();
}
function closeLightbox() {
lightbox.classList.remove("open"); lightbox.setAttribute("aria-hidden", "true");
document.body.style.overflow = "";
restartAuto();
}

function perView() {
var w = window.innerWidth;
if (w <= 560) return 1;
if (w <= 760) return 2;
return 3;
}

var buffer = images.length;
var slidesData = [];
for (var i = 0; i < buffer; i++) slidesData.push(images[((images.length - buffer + i) % images.length + images.length) % images.length]);
for (var j = 0; j < images.length; j++) slidesData.push(images[j]);
for (var k = 0; k < buffer; k++) slidesData.push(images[k % images.length]);

function makeSlide(item) {
var slide = document.createElement("div");
slide.className = "carousel-slide";
var img = document.createElement("img");
img.loading = "lazy"; img.src = item.src; img.alt = item.alt; img.draggable = false;
img.addEventListener("click", function () { openLightbox(item.src, item.alt); });
slide.appendChild(img);
return slide;
}
slidesData.forEach(function (item) { track.appendChild(makeSlide(item)); });
var slides = track.children;

var dots = [];
images.forEach(function (_, i) {
var b = document.createElement("button");
b.className = "dot"; b.type = "button";
b.setAttribute("aria-label", "Gå til billede " + (i + 1));
b.addEventListener("click", function () { userAction(function(){ goTo(i); }); });
dotsWrap.appendChild(b); dots.push(b);
});

var index = buffer;
var animating = false;

function realIndex() {
return ((index - buffer) % images.length + images.length) % images.length;
}
function updateDots() {
var real = realIndex();
dots.forEach(function (d, i) { d.classList.toggle("active", i === real); });
}

function slideWidth() {
var first = track.children[0];
var style = getComputedStyle(track);
var gap = parseFloat(style.columnGap || style.gap || "0") || 0;
return first.offsetWidth + gap;
}

function updateCenter() {
var pv = perView();
var centerOffset = Math.floor((pv - 1) / 2);
for (var s = 0; s < slides.length; s++) slides[s].classList.remove("is-center");
var centerIdx = index + centerOffset;
if (slides[centerIdx]) slides[centerIdx].classList.add("is-center");
}

function setPosition(animate) {
track.style.transition = animate ? "transform 0.5s cubic-bezier(0.4,0.0,0.2,1)" : "none";
track.style.transform = "translateX(" + (-index * slideWidth()) + "px)";
updateDots();
updateCenter();
}

function normalize() {
var realCount = images.length;
if (index >= buffer + realCount) { index -= realCount; setPosition(false); }
else if (index < buffer) { index += realCount; setPosition(false); }
}

function go(dir) {
if (animating) return;
animating = true;
index += dir;
setPosition(true);
}

function goTo(real) {
if (animating) return;
var diff = real - realIndex();
if (diff === 0) return;
animating = true;
index += diff;
setPosition(true);
}

track.addEventListener("transitionend", function (e) {
if (e.target !== track || e.propertyName !== "transform") return;
animating = false;
normalize();
});

var AUTO_MS = 10000;
var autoTimer = null;
var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function startAuto() { if (prefersReduced || autoTimer) return; autoTimer = setInterval(function () { go(1); }, AUTO_MS); }
function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
function restartAuto() { stopAuto(); startAuto(); }
function userAction(fn) { stopAuto(); fn(); restartAuto(); }

nextBtn.addEventListener("click", function () { userAction(function(){ go(1); }); });
prevBtn.addEventListener("click", function () { userAction(function(){ go(-1); }); });

viewport.addEventListener("mouseenter", stopAuto);
viewport.addEventListener("mouseleave", restartAuto);

var startX = 0, startY = 0, dragging = false, swiped = false;
viewport.addEventListener("touchstart", function (e) {
if (e.touches.length !== 1) return;
startX = e.touches[0].clientX; startY = e.touches[0].clientY;
dragging = true; swiped = false; stopAuto();
}, { passive: true });
viewport.addEventListener("touchmove", function (e) {
if (!dragging) return;
var dx = e.touches[0].clientX - startX;
var dy = e.touches[0].clientY - startY;
if (!swiped && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) { swiped = true; go(dx < 0 ? 1 : -1); }
}, { passive: true });
viewport.addEventListener("touchend", function () { dragging = false; restartAuto(); });

var resizeTimer;
window.addEventListener("resize", function () {
clearTimeout(resizeTimer);
resizeTimer = setTimeout(function () { setPosition(false); }, 120);
});

requestAnimationFrame(function () { setPosition(false); startAuto(); });
window.addEventListener("load", function () { setPosition(false); });

lightbox.addEventListener("click", function () { closeLightbox(); });
closeBtn.addEventListener("click", function (e) { e.stopPropagation(); closeLightbox(); });
lightboxImg.addEventListener("click", function (e) { e.stopPropagation(); closeLightbox(); });
document.addEventListener("keydown", function (e) {
if (e.key === "Escape") closeLightbox();
if (e.key === "ArrowRight") userAction(function(){ go(1); });
if (e.key === "ArrowLeft") userAction(function(){ go(-1); });
});
})();
if ("serviceWorker" in navigator) {
window.addEventListener("load", function () { navigator.serviceWorker.register("/sw.js").catch(function () {}); });
}
</script>
